name: F_RDP Session

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:         { description: "Tailscale tailnet", required: true }
      ts_api_key:         { description: "Tailscale API key", required: true }
      ts_authkey:         { description: "Tailscale Auth key", required: true }
      rdp_username:       { description: "RDP Username", required: true }
      rdp_password:       { description: "RDP Password", required: true }
      hostname_base:      { description: "Base hostname", required: false, default: "rdp" }
      quick_test:         { description: "Run 5-minute test", type: boolean, default: false }
      runtime_minutes:    { description: "Runtime minutes", required: false, default: "355" }
      do_purge:           { description: "Purge devices at start", required: false, default: "false" }
      cycles:             { description: "Restart cycles (empty=none)", required: false, default: "" }
      rdp_count:          { description: "Parallel sessions 1-3", required: false, default: "1" }
      telegram_token:     { description: "Telegram Bot Token", required: true }
      telegram_chat_id:   { description: "Telegram Chat ID", required: true }

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 370
    strategy:
      matrix:
        id: ${{ fromJson(inputs.rdp_count == '1' && '[0]' || inputs.rdp_count == '2' && '[0,1]' || '[0,1,2]') }}
      fail-fast: false
    env:
      RDP_USER: ${{ inputs.rdp_username }}
      RDP_PASS: ${{ inputs.rdp_password }}
      TELEGRAM_TOKEN: ${{ inputs.telegram_token }}
      TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id }}

    steps:
      - name: Configure hostname and runtime
        run: |
          $id = "${{ matrix.id }}"
          $base = "${{ inputs.hostname_base }}"
          if (-not $base) { $base = "rdp" }
          $hn = if ($id -eq "0") { $base } else { "$base$id" }
          "TS_HOSTNAME=$hn" | Out-File -Append $env:GITHUB_ENV

          function Yes($v){ "$v" -match '^(?i:true|1|yes|on)$' }
          function IntOr($v,$d){ if("$v" -match '^\d+$'){ [int]$v } else { [int]$d } }
          $runtime = IntOr("${{ inputs.runtime_minutes }}",355)
          if (Yes("${{ inputs.quick_test }}")) { $runtime = 3 }
          if (-not (Yes("${{ inputs.quick_test }}")) -and $runtime -lt 6) { $runtime = 355 }
          if ($runtime -gt 360) { $runtime = 355 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Hostname: $hn | Runtime: $runtime min"

      - name: Purge old Tailscale devices
        run: |
          function Yes($v){ "$v" -match '^(?i:true|1|yes|on)$' }
          if (Yes("${{ inputs.do_purge }}")) {
            try {
              $auth  = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
              # Use "-" — Tailscale resolves it to the tailnet of the authenticating key
              $list  = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/-/devices" -Headers @{ Authorization = "Basic $auth" }
              $hn    = "$env:TS_HOSTNAME".ToLower()
              $count = 0
              foreach ($d in $list.devices) {
                # Extract the short name from the FQDN (e.g. "bavarihere" from "bavarihere.tailnet.ts.net")
                $prefix = ($d.name -split "\.")[0].ToLower()
                # Match exact name OR Tailscale-renamed copies: bavarihere-1, bavarihere-2, …
                $isMatch = ($prefix -eq $hn) -or
                           ($prefix -match "^$([regex]::Escape($hn))-\d+$") -or
                           ($d.hostname.ToLower() -eq $hn)
                if ($isMatch) {
                  try {
                    Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth" }
                    Write-Host "Purged: $($d.name)"
                    $count++
                  } catch { Write-Host "Delete failed for $($d.name): $($_.Exception.Message)" }
                }
              }
              Write-Host "Purged $count device(s) for hostname '$hn'"
            } catch { Write-Host "Purge error: $($_.Exception.Message)" }
          } else { Write-Host "Purge skipped (do_purge=false)" }

      - name: Install and Configure Tailscale
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $ts)) {
            $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
            $dst = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri $url -OutFile $dst
            Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait
            Remove-Item $dst -Force
          }
          & $ts logout 2>$null | Out-Null
          & $ts up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TS_HOSTNAME" --accept-dns=true --accept-routes=true
          $ip4 = & $ts ip -4 | Select-Object -First 1
          "TAILSCALE_IP=$ip4" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Tailscale OK: $env:TS_HOSTNAME ($ip4)"

      - name: Enable RDP
        run: |
          $u = $env:RDP_USER
          $p = $env:RDP_PASS
          Write-Host "Creating RDP user: $u"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          # Create or update user
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -PasswordNeverExpires -UserMayNotChangePassword -FullName "F_RDP"
            Write-Host "User created"
          } else {
            Set-LocalUser -Name $u -Password $sec -PasswordNeverExpires $true
            Enable-LocalUser -Name $u
            Write-Host "User updated"
          }
          # Add to groups
          Add-LocalGroupMember -Group "Administrators" -Member $u -EA SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u -EA SilentlyContinue
          # Enable RDP
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          # Disable NLA requirement so password auth works immediately
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name UserAuthentication -Value 0
          Write-Host "RDP enabled: user=$u host=$env:TS_HOSTNAME ip=$env:TAILSCALE_IP"

      - name: Notify RDP Ready
        run: |
          $u=$env:RDP_USER; $p=$env:RDP_PASS
          Write-Host "RDP ready: user=$u host=$env:TS_HOSTNAME ip=$env:TAILSCALE_IP"
          $message = "🟢 $env:TS_HOSTNAME online`nIP: $env:TAILSCALE_IP`nUser: $u`nPass: $p`nRuntime: $env:RUNTIME_MINUTES min"
          $escapedMessage = $message -replace '"', '\"' -replace "`n", "\n"
          $json = "{`"chat_id`":`"$env:TELEGRAM_CHAT_ID`",`"text`":`"$escapedMessage`"}"
          $json | Out-File -FilePath "$env:TEMP\tg_ready.json" -Encoding UTF8
          curl --max-time 5 -s -X POST "https://api.telegram.org/bot$env:TELEGRAM_TOKEN/sendMessage" -H "Content-Type: application/json; charset=utf-8" -d "@$env:TEMP\tg_ready.json" 2>&1 | Out-Null

      - name: Keep Alive Loop
        run: |
          $mins = [int]"${{ env.RUNTIME_MINUTES }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            $remaining = [math]::Round(($end - (Get-Date)).TotalMinutes, 1)
            Write-Host ("Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | $remaining min left")
            Start-Sleep -Seconds 60
          }

      - name: Session Ended
        if: always()
        run: |
          $message = "⚪ Session ended: $env:TS_HOSTNAME ($env:RUNTIME_MINUTES min)"
          $escapedMessage = $message -replace '"', '\"' -replace "`n", "\n"
          $json = "{`"chat_id`":`"$env:TELEGRAM_CHAT_ID`",`"text`":`"$escapedMessage`"}"
          $json | Out-File -FilePath "$env:TEMP\tg_end.json" -Encoding UTF8
          curl --max-time 5 -s -X POST "https://api.telegram.org/bot$env:TELEGRAM_TOKEN/sendMessage" -H "Content-Type: application/json; charset=utf-8" -d "@$env:TEMP\tg_end.json" 2>&1 | Out-Null

  cycle:
    needs: rdp
    runs-on: ubuntu-latest
    if: always() && inputs.cycles != '' && inputs.cycles != '0'
    defaults:
      run:
        shell: bash
    steps:
      - name: Trigger Next Cycle
        run: |
          CYCLES="${{ inputs.cycles }}"
          NEW_CYCLES=$((CYCLES - 1))
          if [ $NEW_CYCLES -le 0 ]; then
            echo "No cycles remaining"
            exit 0
          fi
          sleep 30
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-telegram-simple.yml/dispatches" \
            -d '{
              "ref": "main",
              "inputs": {
                "ts_tailnet": "${{ inputs.ts_tailnet }}",
                "ts_api_key": "${{ inputs.ts_api_key }}",
                "ts_authkey": "${{ inputs.ts_authkey }}",
                "rdp_username": "${{ inputs.rdp_username }}",
                "rdp_password": "${{ inputs.rdp_password }}",
                "hostname_base": "${{ inputs.hostname_base }}",
                "quick_test": "${{ inputs.quick_test }}",
                "runtime_minutes": "${{ inputs.runtime_minutes }}",
                "do_purge": "false",
                "cycles": "'$NEW_CYCLES'",
                "rdp_count": "${{ inputs.rdp_count }}",
                "telegram_token": "${{ inputs.telegram_token }}",
                "telegram_chat_id": "${{ inputs.telegram_chat_id }}"
              }
            }'
